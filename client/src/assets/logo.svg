<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3FB6FF"/>
      <stop offset="100%" stop-color="#2176FF"/>
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8B2FE8"/>
      <stop offset="100%" stop-color="#6E36FF"/>
    </linearGradient>

    <linearGradient id="magentaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#A536FF"/>
      <stop offset="100%" stop-color="#F141F7"/>
    </linearGradient>

    <linearGradient id="smallChevGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2176FF"/>
      <stop offset="100%" stop-color="#6E36FF"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="1200" fill="#ffffff"/>

  <!-- ================= main </> mark ================= -->

  <!-- left chevron < -->
  <polyline points="485,425 205,575 485,725"
            fill="none"
            stroke="url(#blueGrad)"
            stroke-width="50"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- slash / -->
  <line x1="665" y1="360" x2="530" y2="790"
        stroke="url(#purpleGrad)"
        stroke-width="48"
        stroke-linecap="round"/>

  <!-- right chevron > -->
  <polyline points="715,425 1020,575 715,725"
            fill="none"
            stroke="url(#magentaGrad)"
            stroke-width="50"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- ================= decorative accents ================= -->

  <!-- sparkle, top left -->
  <path d="M385,254 C390,280 390,280 416,290 C390,300 390,300 385,326
           C380,300 380,300 354,290 C380,280 380,280 385,254 Z"
        fill="#3FB6FF"/>

  <!-- small diamond / checker cluster, left -->
  <g transform="translate(150,540) rotate(45)">
    <rect x="-25" y="-8" width="17" height="17" fill="#3FB6FF"/>
    <rect x="8"   y="-8" width="17" height="17" fill="#3FB6FF"/>
    <rect x="-8"  y="-25" width="17" height="17" fill="#3FB6FF"/>
    <rect x="-8"  y="8"  width="17" height="17" fill="#3FB6FF" opacity="0.45"/>
  </g>

  <!-- small ring, bottom left -->
  <circle cx="395" cy="775" r="14" fill="none" stroke="#3FB6FF" stroke-width="9"/>

  <!-- small chevron, top right -->
  <polyline points="792,272 818,290 792,308"
            fill="none"
            stroke="url(#smallChevGrad)"
            stroke-width="13"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- small ring, right -->
  <circle cx="1085" cy="575" r="18" fill="none" stroke="#F141F7" stroke-width="11"/>

  <!-- dash accents, bottom right -->
  <rect x="805" y="772" width="98" height="14" rx="7" fill="#F141F7"/>
  <rect x="895" y="748" width="50" height="14" rx="7" fill="#F141F7"/>

</svg>
