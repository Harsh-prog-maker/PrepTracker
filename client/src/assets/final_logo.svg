<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">

  <!-- background -->
  <rect x="0" y="0" width="1200" height="1200" fill="#ffffff"/>

  <!-- ================= main </> mark (centered on 600,600) ================= -->
  <!-- chevrons occupy x:110-480 and x:720-1090 -->
  <!-- slash occupies x:560-640 only, so it never reaches the chevron corners -->

  <!-- left chevron < -->
  <polyline points="480,370 110,600 480,830"
            fill="none"
            stroke="#723EC3"
            stroke-width="62"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- slash / (kept inside the gap, clear of both chevrons) -->
  <line x1="640" y1="330" x2="560" y2="870"
        stroke="#723EC3"
        stroke-width="62"
        stroke-linecap="round"/>

  <!-- right chevron > -->
  <polyline points="720,370 1090,600 720,830"
            fill="none"
            stroke="#723EC3"
            stroke-width="62"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- ================= light blue sparkles (aligned to left chevron) ================= -->

  <!-- sparkle, diagonally above the chevron tip -->
  <path d="M260,215 C267,244 267,244 296,256 C267,268 267,268 260,297
           C253,268 253,268 224,256 C253,244 253,244 260,215 Z"
        fill="#3FB6FF"/>

  <!-- diamond / checker cluster, level with the chevron tip -->
  <g transform="translate(60,600) rotate(45)">
    <rect x="-27" y="-9" width="18" height="18" fill="#3FB6FF"/>
    <rect x="9"   y="-9" width="18" height="18" fill="#3FB6FF"/>
    <rect x="-9"  y="-27" width="18" height="18" fill="#3FB6FF"/>
    <rect x="-9"  y="9"  width="18" height="18" fill="#3FB6FF" opacity="0.45"/>
  </g>

  <!-- ================= scattered circles, top right ================= -->
  <circle cx="1000" cy="230" r="20" fill="none" stroke="#3FB6FF" stroke-width="12"/>
  <circle cx="1085" cy="175" r="9" fill="#3FB6FF"/>
  <circle cx="930" cy="155" r="6" fill="#3FB6FF" opacity="0.55"/>

  <!-- ================= lines, bottom ================= -->
  <rect x="780" y="885" width="115" height="17" rx="8.5" fill="#3FB6FF"/>
  <rect x="880" y="852" width="58" height="17" rx="8.5" fill="#3FB6FF"/>

</svg>
